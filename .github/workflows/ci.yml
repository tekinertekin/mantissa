name: ci

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forward tests (all 7 storage formats)
        run: |
          for d in 0 1 2 3 4 5 6; do
            echo "== DTYPE=$d =="
            make DTYPE=$d test
          done
      - name: Back-propagation gradient check
        run: make testbp
