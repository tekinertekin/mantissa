name: ci

on: [push, pull_request]

jobs:
  # Runs the full test matrix on x86-64 (ubuntu) and Apple Silicon (macos-14),
  # so the arm64 NEON kernels — including the FEAT_BF16 BFMLAL dispatch — are
  # actually exercised in CI and not only on Linux/x86.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Forward tests (all 7 storage formats)
        run: |
          for d in 0 1 2 3 4 5 6; do
            echo "== DTYPE=$d =="
            make DTYPE=$d test
          done
      - name: Back-propagation gradient check
        run: make testbp
      # Exercise the -fPIC/-shared build here rather than discovering a broken
      # shared object at release time (release.yml is tag-gated).
      - name: Shared library build
        run: make lib
      # Warnings can't fail the normal build, so recompile everything with the
      # Makefile's exact flags plus -Werror to gate on a clean compile. Cover
      # the three SIMD-dispatched float dtypes (f32/fp16/bf16) so each AVX2 /
      # F16C code path is warning-gated -- the fp16 path in particular selects a
      # different cpuid helper, and a build that leaves the other one unused
      # must not trip -Wunused-function.
      - name: Warnings check (-Werror)
        run: |
          mkdir -p build
          for d in 0 1 2; do
            cc -O3 -funroll-loops -ffp-contract=fast -Wall -Wextra -std=c11 \
               -Iinclude -DTK_DTYPE=$d -fvisibility=hidden -pthread -Werror \
               -o build/test_dtypes_werror \
               src/dtypes.c src/activations.c src/ops.c src/loss.c src/backprop.c src/pool.c \
               tests/test_dtypes.c -lm -pthread
          done
      # AUTHORITATIVE x86 SIMD numbers. macOS-arm64 devs can only build the AVX2
      # /F16C kernels under Rosetta, which reports no AVX2/FMA/F16C (SSE4.2 max)
      # and so runs the scalar fallback -- these kernels genuinely execute only
      # on this real-x86 runner. Informational (|| true): perf must never fail
      # CI, and shared runners are DVFS-noisy, so five interleaved repeats are
      # logged per dtype to read a median from, not a single run.
      - name: GEMV/GEMM bench (x86, informational)
        if: matrix.os == 'ubuntu-latest'
        run: |
          for d in 0 1 2; do
            echo "==== DTYPE=$d (5 interleaved repeats) ===="
            make DTYPE=$d bench || true                 # builds build/benchmark + repeat 1
            for r in 2 3 4 5; do ./build/benchmark || true; done
          done

  # AddressSanitizer + UndefinedBehaviorSanitizer so memory/UB bugs regress
  # loudly. One storage format (DTYPE=2) plus the backprop check is enough.
  # Flags mirror the Makefile exactly, -ffp-contract=fast included (the dropout
  # test that was 1-ULP fragile under contraction now stores its expected
  # values once instead of recomputing the expression).
  sanitizer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ASAN + UBSAN (forward, DTYPE=2)
        run: |
          mkdir -p build
          cc -O3 -funroll-loops -ffp-contract=fast -Wall -Wextra -std=c11 \
             -Iinclude -DTK_DTYPE=2 -fvisibility=hidden -pthread \
             -fsanitize=address,undefined -fno-omit-frame-pointer -g \
             -o build/test_dtypes_san \
             src/dtypes.c src/activations.c src/ops.c src/loss.c src/backprop.c src/pool.c \
             tests/test_dtypes.c -lm -pthread
          ./build/test_dtypes_san
      - name: ASAN + UBSAN (back-propagation)
        run: |
          cc -O3 -funroll-loops -ffp-contract=fast -Wall -Wextra -std=c11 \
             -Iinclude -DTK_DTYPE=0 -pthread \
             -fsanitize=address,undefined -fno-omit-frame-pointer -g \
             -o build/test_backprop_san \
             src/dtypes.c src/activations.c src/ops.c src/loss.c src/backprop.c src/pool.c \
             tests/test_backprop.c -lm -pthread
          ./build/test_backprop_san
