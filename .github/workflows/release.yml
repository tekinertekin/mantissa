name: release

# On every version tag, build the shared library on Linux, macOS, and Windows
# and attach the binaries to the GitHub Release so anyone can download and use
# them directly — no toolchain, no `make`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: libmantissa-linux-x86_64.so
            ext: so
          - os: macos-latest
            asset: libmantissa-macos-arm64.dylib
            ext: dylib
          - os: windows-latest
            asset: libmantissa-windows-x86_64.dll
            ext: dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          make lib
          cp build/libmantissa.${{ matrix.ext }} ${{ matrix.asset }}

      # Windows uses the preinstalled MinGW gcc (the code relies on GCC/Clang
      # builtins that MSVC lacks); tk_export.h emits __declspec(dllexport).
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          gcc -O3 -funroll-loops -ffp-contract=fast -std=c11 -Iinclude \
              -DTK_DTYPE=2 -DTK_BUILD_DLL -shared \
              -o ${{ matrix.asset }} \
              src/dtypes.c src/activations.c src/ops.c src/loss.c src/backprop.c src/pool.c

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release with binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
